<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{archive_title}}</title>
  <meta name="description" content="{{archive_title}} — Aoaeolaが選んだ注目トレンド">
  <link rel="canonical" href="{{canonical_url}}">
  <style>
    :root {
      --bg-start: {{gradient_start}};
      --bg-end: {{gradient_end}};
      --text: #1a1a2e;
      --card-bg: rgba(255,255,255,0.85);
      --accent: hsl({{hue_start}}, 70%, 35%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      min-height: 100vh;
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    header {
      text-align: center;
      padding: 3rem 0 2rem;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header time {
      display: block;
      margin-top: 0.5rem;
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
    }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }
    .card p {
      font-size: 0.95rem;
      color: #444;
    }
    .card .meta {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #888;
    }
    .back-link {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.9);
      color: var(--accent);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .back-link:hover {
      background: #fff;
    }
    footer {
      text-align: center;
      padding: 3rem 0 2rem;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>{{archive_title}}</h1>
      <time datetime="{{iso_datetime}}">{{display_datetime}}</time>
    </header>

    <main>
      {{content_cards}}
    </main>

    <div style="text-align:center;">
      <a href="/" class="back-link">← トップページへ戻る</a>
    </div>

    <footer>
      <p>Generated by Aoaeola v2.5 · {{generation_time}}</p>
    </footer>
  </div>
</body>
</html>
